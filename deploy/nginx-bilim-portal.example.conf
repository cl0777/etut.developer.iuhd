# Example Nginx site for Bilim Portal on Ubuntu 20.04+
# Copy to /etc/nginx/sites-available/bilim-portal and symlink to sites-enabled.
# Replace server_name and paths. TLS: use certbot (letsencrypt).

upstream bilim_api {
    server 127.0.0.1:3000;
}

server {
    listen 80;
    server_name your-domain.example;

    root /var/www/bilim-portal/frontend/dist;
    index index.html;

    location /api/ {
        proxy_pass http://bilim_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
